<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 😈</title>

<style>
body {
  margin: 0;
  font-family: serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #111;
  color: white;
  flex-direction: column;
}

.container {
  text-align: center;
}

img {
  width: 300px;
  transition: transform 0.6s;
}

button {
  border: none;
  background: none;
  cursor: pointer;
  position: relative;
}

button:hover img {
  transform: rotate(360deg) scale(1.1);
}

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.3s;
}

button:hover .overlay {
  opacity: 1;
}

.overlay span {
  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 6px;
}

#videoContainer {
  display: none;
  width: 100vw;
  height: 100vh;
  background: black;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div class="container" id="startScreen">
  <h1>Happy birthday Justin!</h1>

  <button onclick="startRickRoll()">
    <img src="https://i.ibb.co/9mqmb2xs/image-2026-03-17-214213699.png" alt="click me" />
    <div class="overlay">
      <span>click me</span>
    </div>
  </button>
</div>

<!-- VIDEO SCREEN -->
<div id="videoContainer">
  <video id="video" autoplay playsinline>
    <source id="videoSource" src="" type="video/mp4">
  </video>
</div>

<script>
function startRickRoll() {
<iframe width="560" height="315" src="https://www.youtube.com/embed/hB7CDrVnNCs?si=7b7GdDncKP7KDESu" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  });
}
</script>

</body>
</html>
